<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards - Reading System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header {
    width: 100%;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #1a1a2e;
}
.header h1 { font-size: 1.5em; color: #7c5cfc; }
.stats-bar {
    display: flex; gap: 20px; justify-content: center;
    margin-top: 10px; font-size: 0.9em;
}
.stat { padding: 4px 12px; border-radius: 12px; background: #1a1a2e; }
.stat.new { color: #5b9bf5; }
.stat.learning { color: #f5c542; }
.stat.review { color: #4caf50; }
.stat.done { color: #9e9e9e; }

.card-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; max-width: 600px; padding: 20px;
}
.card {
    width: 100%; min-height: 300px; perspective: 1000px; cursor: pointer;
}
.card-inner {
    position: relative; width: 100%; min-height: 300px;
    transition: transform 0.5s; transform-style: preserve-3d;
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-front, .card-back {
    position: absolute; width: 100%; min-height: 300px;
    backface-visibility: hidden; border-radius: 16px;
    padding: 30px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
}
.card-front {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    border: 1px solid #7c5cfc33;
}
.card-back {
    background: linear-gradient(145deg, #16213e, #1a1a2e);
    border: 1px solid #4caf5033;
    transform: rotateY(180deg);
}
.card-type {
    position: absolute; top: 12px; left: 16px;
    font-size: 0.75em; padding: 2px 8px; border-radius: 8px;
    background: #7c5cfc22; color: #7c5cfc;
}
.card-book {
    position: absolute; top: 12px; right: 16px;
    font-size: 0.7em; color: #666; max-width: 200px;
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
}
.card-text { font-size: 1.3em; line-height: 1.6; }
.card-chapter { margin-top: 15px; font-size: 0.8em; color: #666; }
.card-hint { margin-top: 20px; font-size: 0.85em; color: #555; }
.card-back .card-text { color: #4caf50; }

.rating-container {
    width: 100%; max-width: 600px; padding: 20px;
    display: none; /* shown after flip */
}
.rating-label { text-align: center; margin-bottom: 12px; font-size: 0.9em; color: #888; }
.rating-buttons {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.rating-btn {
    padding: 14px 8px; border: none; border-radius: 12px;
    font-size: 0.9em; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
}
.rating-btn:active { transform: scale(0.95); }
.rating-btn.r0 { background: #d32f2f22; color: #ef5350; border: 1px solid #d32f2f44; }
.rating-btn.r1 { background: #e6511522; color: #ff7043; border: 1px solid #e6511544; }
.rating-btn.r2 { background: #f57c0022; color: #ffa726; border: 1px solid #f57c0044; }
.rating-btn.r3 { background: #fbc02d22; color: #ffee58; border: 1px solid #fbc02d44; }
.rating-btn.r4 { background: #66bb6a22; color: #66bb6a; border: 1px solid #66bb6a44; }
.rating-btn.r5 { background: #42a5f522; color: #42a5f5; border: 1px solid #42a5f544; }
.rating-btn .interval { display: block; font-size: 0.75em; color: #888; margin-top: 4px; }

.empty-state {
    text-align: center; padding: 60px 20px;
}
.empty-state h2 { color: #4caf50; margin-bottom: 10px; }

.search-container {
    width: 100%; max-width: 600px; padding: 20px;
}
.search-container input {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid #1a1a2e; background: #111; color: #e0e0e0;
    font-size: 1em;
}
.search-container input:focus { outline: none; border-color: #7c5cfc; }

.tabs {
    display: flex; gap: 0; margin-top: 15px; width: 100%; max-width: 600px;
}
.tab {
    flex: 1; padding: 10px; text-align: center; cursor: pointer;
    border-bottom: 2px solid transparent; color: #666; font-size: 0.9em;
    transition: all 0.2s;
}
.tab.active { color: #7c5cfc; border-bottom-color: #7c5cfc; }

.book-search {
    width: 100%; max-width: 600px; padding: 20px; display: none;
}
.book-search input {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid #1a1a2e; background: #111; color: #e0e0e0;
    font-size: 1em;
}
.book-search input:focus { outline: none; border-color: #7c5cfc; }
.book-results { margin-top: 15px; }
.book-result {
    padding: 15px; border-radius: 12px; background: #1a1a2e;
    margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
    display: flex; gap: 12px;
}
.book-result:hover { background: #16213e; border: 1px solid #7c5cfc33; }
.book-cover { width: 60px; height: 90px; object-fit: cover; border-radius: 6px; background: #111; }
.book-info h3 { font-size: 1em; color: #e0e0e0; }
.book-info p { font-size: 0.85em; color: #888; margin-top: 4px; }

.progress-bar {
    width: 100%; height: 4px; background: #1a1a2e; border-radius: 2px;
    margin-top: 15px; overflow: hidden;
}
.progress-fill {
    height: 100%; background: linear-gradient(90deg, #7c5cfc, #4caf50);
    transition: width 0.5s;
}
</style>
</head>
<body>
<div class="header">
    <h1>Flashcards</h1>
    <div class="stats-bar">
        <span class="stat new" id="newCount">0 nouvelles</span>
        <span class="stat learning" id="learningCount">0 en cours</span>
        <span class="stat review" id="reviewCount">0 a revoir</span>
        <span class="stat done" id="doneCount">0 terminees</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('review')">Revision</div>
    <div class="tab" onclick="showTab('search')">Recherche Livre</div>
</div>

<div id="reviewTab">
    <div class="card-container" id="cardContainer">
        <div class="empty-state" id="emptyState">
            <h2>Aucune carte a revoir</h2>
            <p>Toutes les cartes sont a jour. Reviens demain !</p>
        </div>
        <div class="card" id="card" onclick="flipCard()" style="display:none;">
            <div class="card-inner" id="cardInner">
                <div class="card-front">
                    <span class="card-type" id="cardType"></span>
                    <span class="card-book" id="cardBook"></span>
                    <div class="card-text" id="frontText"></div>
                    <div class="card-chapter" id="cardChapter"></div>
                    <div class="card-hint">Touche pour voir la reponse</div>
                </div>
                <div class="card-back">
                    <div class="card-text" id="backText"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="rating-container" id="ratingContainer">
        <div class="rating-label">Comment etait ton rappel ?</div>
        <div class="rating-buttons">
            <button class="rating-btn r0" onclick="rateCard(0)">Blackout<span class="interval" id="int0"></span></button>
            <button class="rating-btn r1" onclick="rateCard(1)">Faux<span class="interval" id="int1"></span></button>
            <button class="rating-btn r2" onclick="rateCard(2)">Faux (facile)<span class="interval" id="int2"></span></button>
            <button class="rating-btn r3" onclick="rateCard(3)">Difficile<span class="interval" id="int3"></span></button>
            <button class="rating-btn r4" onclick="rateCard(4)">Bien<span class="interval" id="int4"></span></button>
            <button class="rating-btn r5" onclick="rateCard(5)">Parfait<span class="interval" id="int5"></span></button>
        </div>
    </div>
</div>

<div class="book-search" id="searchTab">
    <input type="text" id="bookSearchInput" placeholder="Chercher un livre (titre, auteur, ISBN)..."
        onkeydown="if(event.key==='Enter')searchBook()">
    <div class="book-results" id="bookResults"></div>
</div>

<script>
// === CONFIG ===
const NOTION_WEBHOOK = ''; // Will be set when n8n workflow is created
const FLASHCARDS_COLLECTION = 'e5467f7c-81c2-4a6e-8c61-aa4bb3ee841c';
const BOOKS_COLLECTION = '2917d8ba-b3e4-419f-bc32-602c837acda1';

// === STATE ===
let cards = [];
let currentIndex = 0;
let sessionDone = 0;
let sessionTotal = 0;

// === SM-2 ALGORITHM ===
function sm2(quality, repetitions = 0, easeFactor = 2.5, interval = 0) {
    quality = Math.max(0, Math.min(5, quality));
    let newEF = easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
    newEF = Math.max(1.3, newEF);

    let newReps, newInterval;
    if (quality < 3) {
        newReps = 0;
        newInterval = 1;
    } else {
        if (repetitions === 0) newInterval = 1;
        else if (repetitions === 1) newInterval = 6;
        else newInterval = Math.round(interval * newEF);
        newReps = repetitions + 1;
    }

    const nextReview = new Date();
    nextReview.setDate(nextReview.getDate() + newInterval);

    let status = 'Learning';
    if (newReps > 0 && newInterval >= 30) status = 'Mastered';
    else if (newReps > 0 && newInterval >= 6) status = 'Review';

    return {
        repetitions: newReps,
        ease_factor: Math.round(newEF * 100) / 100,
        interval_days: newInterval,
        next_review: nextReview.toISOString().split('T')[0],
        status
    };
}

function previewIntervals(repetitions, easeFactor, interval) {
    for (let q = 0; q <= 5; q++) {
        const result = sm2(q, repetitions, easeFactor, interval);
        const el = document.getElementById(`int${q}`);
        if (el) {
            const d = result.interval_days;
            el.textContent = d === 1 ? '1 jour' : d < 30 ? `${d} jours` : `${Math.round(d/30)} mois`;
        }
    }
}

// === TABS ===
function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (tab === 'review') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('reviewTab').style.display = '';
        document.getElementById('searchTab').style.display = 'none';
    } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('reviewTab').style.display = 'none';
        document.getElementById('searchTab').style.display = '';
    }
}

// === CARD DISPLAY ===
function showCard() {
    const ratingContainer = document.getElementById('ratingContainer');
    const cardInner = document.getElementById('cardInner');

    if (currentIndex >= cards.length) {
        document.getElementById('card').style.display = 'none';
        document.getElementById('emptyState').style.display = '';
        document.getElementById('emptyState').innerHTML = `
            <h2>Session terminee</h2>
            <p>${sessionDone} carte(s) revisee(s) aujourd'hui</p>
        `;
        ratingContainer.style.display = 'none';
        return;
    }

    const card = cards[currentIndex];
    document.getElementById('card').style.display = '';
    document.getElementById('emptyState').style.display = 'none';
    cardInner.classList.remove('flipped');
    ratingContainer.style.display = 'none';

    document.getElementById('cardType').textContent = card.type || 'Factual';
    document.getElementById('cardBook').textContent = card.book_title || '';
    document.getElementById('frontText').textContent = card.front;
    document.getElementById('backText').textContent = card.back;
    document.getElementById('cardChapter').textContent = card.chapter ? `Ch. ${card.chapter}` : '';

    previewIntervals(card.repetitions || 0, card.ease_factor || 2.5, card.interval_days || 0);
}

function flipCard() {
    const inner = document.getElementById('cardInner');
    if (!inner.classList.contains('flipped')) {
        inner.classList.add('flipped');
        document.getElementById('ratingContainer').style.display = '';
    }
}

function rateCard(quality) {
    const card = cards[currentIndex];
    const result = sm2(
        quality,
        card.repetitions || 0,
        card.ease_factor || 2.5,
        card.interval_days || 0
    );

    // Update card locally
    card.repetitions = result.repetitions;
    card.ease_factor = result.ease_factor;
    card.interval_days = result.interval_days;
    card.next_review = result.next_review;
    card.last_reviewed = new Date().toISOString().split('T')[0];
    card.status = result.status;
    card.quality = quality;

    // Save to localStorage
    saveCardsLocal();

    // Update Notion via webhook (fire and forget)
    if (NOTION_WEBHOOK && card.notion_url) {
        fetch(NOTION_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'update_card',
                page_url: card.notion_url,
                ...result,
                quality,
                last_reviewed: card.last_reviewed
            })
        }).catch(() => {});
    }

    sessionDone++;
    currentIndex++;
    updateStats();
    showCard();
}

// === STATS ===
function updateStats() {
    const now = new Date().toISOString().split('T')[0];
    let newC = 0, learning = 0, review = 0;

    cards.forEach(c => {
        if (!c.next_review) newC++;
        else if (c.status === 'Learning') learning++;
        else if (c.status === 'Review' || c.status === 'New') review++;
    });

    document.getElementById('newCount').textContent = `${newC} nouvelles`;
    document.getElementById('learningCount').textContent = `${learning} en cours`;
    document.getElementById('reviewCount').textContent = `${cards.length - currentIndex} a revoir`;
    document.getElementById('doneCount').textContent = `${sessionDone} terminees`;

    const total = cards.length || 1;
    document.getElementById('progress').style.width = `${(sessionDone / total) * 100}%`;
}

// === LOCAL STORAGE ===
function saveCardsLocal() {
    localStorage.setItem('flashcards', JSON.stringify(cards));
}

function loadCardsLocal() {
    const stored = localStorage.getItem('flashcards');
    if (stored) {
        cards = JSON.parse(stored);
    }
}

// === BOOK SEARCH ===
async function searchBook() {
    const query = document.getElementById('bookSearchInput').value.trim();
    if (!query) return;

    const resultsDiv = document.getElementById('bookResults');
    resultsDiv.innerHTML = '<p style="color:#888">Recherche en cours...</p>';

    try {
        // Google Books
        const gResp = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5`);
        const gData = await gResp.json();

        let html = '';
        for (const item of (gData.items || [])) {
            const info = item.volumeInfo || {};
            const cover = info.imageLinks?.thumbnail || '';
            const authors = (info.authors || []).join(', ');
            const pages = info.pageCount || '?';
            const isbn = (info.industryIdentifiers || []).find(i => i.type === 'ISBN_13')?.identifier || '';
            const desc = (info.description || '').substring(0, 100);

            html += `
            <div class="book-result" onclick='selectBook(${JSON.stringify({
                title: info.title || '',
                authors: info.authors || [],
                pages: info.pageCount || 0,
                isbn: isbn,
                cover: cover,
                language: info.language || '',
                description: info.description || '',
                categories: info.categories || []
            }).replace(/'/g, "&#39;")})'>
                ${cover ? `<img class="book-cover" src="${cover}" alt="">` : '<div class="book-cover"></div>'}
                <div class="book-info">
                    <h3>${info.title || 'Sans titre'}</h3>
                    <p>${authors} | ${pages} pages ${isbn ? '| ' + isbn : ''}</p>
                    <p>${desc}${desc.length >= 100 ? '...' : ''}</p>
                </div>
            </div>`;
        }

        resultsDiv.innerHTML = html || '<p style="color:#888">Aucun resultat</p>';
    } catch (e) {
        resultsDiv.innerHTML = `<p style="color:#ef5350">Erreur: ${e.message}</p>`;
    }
}

function selectBook(book) {
    // Save book selection for use with Orun
    localStorage.setItem('currentBook', JSON.stringify(book));
    alert(`Livre selectionne: ${book.title}\n\nUtilise /lecture dans Orun pour loguer une session de lecture pour ce livre.`);
}

// === ADD CARDS MANUALLY (for testing) ===
function addTestCards() {
    const testCards = [
        {
            front: "Selon James Clear, quel est le mecanisme fondamental de formation des habitudes ?",
            back: "La boucle de 4 etapes : Signal (Cue) → Envie (Craving) → Reponse (Response) → Recompense (Reward). Chaque habitude suit ce cycle.",
            type: "Conceptual",
            book_title: "Atomic Habits",
            chapter: "1",
            repetitions: 0, ease_factor: 2.5, interval_days: 0, status: "New"
        },
        {
            front: "La loi du ___ dit qu'une amelioration de 1% par jour donne un resultat ___ fois meilleur apres un an.",
            back: "La loi du progres marginal : 1.01^365 = 37.78. Une amelioration de 1% par jour vous rend 37 fois meilleur en un an.",
            type: "Cloze",
            book_title: "Atomic Habits",
            chapter: "1",
            repetitions: 0, ease_factor: 2.5, interval_days: 0, status: "New"
        },
        {
            front: "Quelles sont les 4 lois du changement de comportement selon Atomic Habits ?",
            back: "1. Rendre le signal evident (Cue)\n2. Rendre l'habitude attractive (Craving)\n3. Rendre l'action facile (Response)\n4. Rendre la recompense satisfaisante (Reward)",
            type: "Factual",
            book_title: "Atomic Habits",
            chapter: "3",
            repetitions: 0, ease_factor: 2.5, interval_days: 0, status: "New"
        },
        {
            front: "Comment appliquerais-tu le 'habit stacking' pour integrer la lecture dans ta routine quotidienne ?",
            back: "Apres [habitude existante], je vais [lire 10 pages]. Exemple : 'Apres avoir pose mon cafe du matin sur la table, je lis 10 pages.' On lie la nouvelle habitude a un signal existant.",
            type: "Application",
            book_title: "Atomic Habits",
            chapter: "5",
            repetitions: 0, ease_factor: 2.5, interval_days: 0, status: "New"
        },
    ];

    cards = testCards;
    saveCardsLocal();
    sessionTotal = cards.length;
    currentIndex = 0;
    sessionDone = 0;
    updateStats();
    showCard();
}

// === INIT ===
function init() {
    loadCardsLocal();

    // Filter due cards
    const today = new Date().toISOString().split('T')[0];
    const dueCards = cards.filter(c => {
        if (!c.next_review) return true; // New
        return c.next_review <= today;
    });

    if (dueCards.length === 0 && cards.length === 0) {
        // No cards at all — show add test cards option
        document.getElementById('emptyState').innerHTML = `
            <h2>Aucune carte</h2>
            <p>Commence par loguer une session de lecture pour generer des flashcards.</p>
            <br>
            <button onclick="addTestCards()" style="padding:10px 20px;border-radius:12px;border:1px solid #7c5cfc;background:#7c5cfc22;color:#7c5cfc;cursor:pointer;font-size:1em;">
                Charger cartes de demo (Atomic Habits)
            </button>
        `;
    } else if (dueCards.length === 0) {
        // Cards exist but none due
    } else {
        cards = dueCards;
        sessionTotal = cards.length;
        showCard();
    }

    updateStats();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        flipCard();
    }
    if (e.key >= '0' && e.key <= '5') {
        const inner = document.getElementById('cardInner');
        if (inner.classList.contains('flipped')) {
            rateCard(parseInt(e.key));
        }
    }
});

init();
</script>
</body>
</html>
